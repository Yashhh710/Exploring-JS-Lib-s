<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vanta Pro: Volumetric Aura</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #vanta-bg { width: 100vw; height: 100vh; }
        .hud-ui {
            position: absolute; top: 40px; left: 40px;
            color: #00f2ff; font-family: 'Courier New', monospace;
            border-left: 2px solid #ff0044; padding-left: 15px;
            text-transform: uppercase; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="vanta-bg"></div>
    <div class="hud-ui">
        ATMOSPHERE_STATE: CRITICAL<br>
        PARTICLE_DENSITY: HIGH_VELOCITY<br>
        AURA_TYPE: VOLUMETRIC_HAKI
    </div>

<script>

VANTA.CLOUDS({
  el: "#vanta-bg",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,

  backgroundColor: 0x000205, // Deep Space Black
  skyColor: 0x051a2b,       // Dark Navy Base
  cloudColor: 0xff0044,     // Haki Red Highlights
  cloudShadowColor: 0x001a1a, // Cyan Shadow contrast
  sunColor: 0x00f2ff,       // Center Neon Cyan
  sunGlareColor: 0x7000ff,  // Purple Glare
  sunlightColor: 0xff0044,  // Red light scattering
  speed: 1.5                // Accelerated flow
});
</script>
</body>
</html>

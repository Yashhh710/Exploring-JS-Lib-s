<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Final Boss: GPGPU Haki Universe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; }
        .boss-hud {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-family: 'Syncopate', sans-serif; text-transform: uppercase;
            letter-spacing: 20px; pointer-events: none; text-align: center; opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="boss-hud"><h1>Final Boss</h1><p>Haki_Engine_v1.0</p></div>
    <div id="canvas-container"></div>

<script>

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas-container').appendChild(renderer.domElement);


const particleCount = 100000;
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {

    const r = 5 * Math.pow(Math.random(), 0.5);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    
    positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);


    colors[i * 3] = Math.random() > 0.5 ? 1 : 0; // R
    colors[i * 3 + 1] = 0.9; // G
    colors[i * 3 + 2] = 1; // B
}

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));


const material = new THREE.ShaderMaterial({
    uniforms: {
        uTime: { value: 0 },
        uMouse: { value: new THREE.Vector3() }
    },
    vertexShader: `
        uniform float uTime;
        uniform vec3 uMouse;
        varying vec3 vColor;
        void main() {
            vColor = color;
            vec3 pos = position;
            

            float dist = distance(pos, uMouse);
            float force = 1.0 / (dist + 1.0);
            
            pos.x += sin(uTime + pos.z) * force * 2.0;
            pos.y += cos(uTime + pos.x) * force * 2.0;
            
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = 2.0 * (1.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    `,
    fragmentShader: `
        varying vec3 vColor;
        void main() {
            if (length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
            gl_FragColor = vec4(vColor, 1.0);
        }
    `,
    transparent: true,
    vertexColors: true
});

const points = new THREE.Points(geometry, material);
scene.add(points);

camera.position.z = 10;


let mouse = new THREE.Vector3();
window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    mouse.z = 0;
});


function animate(time) {
    material.uniforms.uTime.value = time * 0.001;
    

    const vector = mouse.clone().unproject(camera);
    material.uniforms.uMouse.value.lerp(vector, 0.1);

    points.rotation.y += 0.001;
    points.rotation.z += 0.0005;

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>

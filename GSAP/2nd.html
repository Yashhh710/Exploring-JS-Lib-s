<!DOCTYPE html>
<html>
<head>
    <title>GSAP Cyber Scan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { 
            background: #020202; 
            color: #00f2ff; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        .line {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 10px;
            position: relative;
            margin: 10px 0;
            opacity: 0;
            text-shadow: 0 0 10px #00f2ff;
        }

        .scanner-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #fff;
            box-shadow: 0 0 20px #fff;
            display: none;
        }
    </style>
</head>
<body>

    <div class="line">Initializing...</div>
    <div class="line">Neural Link Established</div>
    <div class="line" style="color: #ff0055; text-shadow: 0 0 10px #ff0055;">Access Granted</div>

    <script>
        const lines = document.querySelectorAll('.line');

        const tl = gsap.timeline({ repeat: -1, repeatDelay: 1 });

        lines.forEach((line) => {

            tl.to(line, {
                opacity: 1,
                duration: 0.05,
                repeat: 5,
                yoyo: true,
                ease: "power2.inOut"
            })
            .to(line, {
                opacity: 1,
                duration: 0.1,
                onStart: () => {

                    gsap.to(line, { x: 10, duration: 0.05, repeat: 3, yoyo: true });
                }
            })
            .from(line, {
                letterSpacing: "50px",
                filter: "blur(10px)",
                duration: 0.5,
                ease: "back.out(1.7)"
            }, "-=0.1");
        });


        gsap.to("body", {
            opacity: 0.95,
            duration: 0.1,
            repeat: -1,
            yoyo: true,
            ease: "none"
        });
    </script>
</body>
</html>

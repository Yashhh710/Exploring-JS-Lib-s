<!DOCTYPE html>
<html>
<head>
    <title>GSAP Haki Impact</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            background: #050505; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            cursor: pointer;
        }
        .bolt {
            position: absolute;
            width: 4px;
            height: 100px;
            background: #ff0044; /* Red Haki color */
            box-shadow: 0 0 20px #ff0000;
            border-radius: 10px;
            opacity: 0;
        }
        .core {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 50px white;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="core"></div>
    <script>

        for (let i = 0; i < 20; i++) {
            const bolt = document.createElement('div');
            bolt.className = 'bolt';
            document.body.appendChild(bolt);
        }

        const bolts = document.querySelectorAll('.bolt');
        const core = document.querySelector('.core');


        function clash() {
            const tl = gsap.timeline();


            tl.to("body", { duration: 0.1, x: 10, repeat: 5, yoyo: true });


            tl.fromTo(core, 
                { scale: 0, opacity: 1 }, 
                { scale: 8, opacity: 0, duration: 0.4, ease: "expo.out" }, 0
            );


            tl.fromTo(bolts, 
                { 
                    x: 0, y: 0, opacity: 1, scale: 1,
                    rotation: (i) => i * 18 // Distribute in a circle
                }, 
                { 
                    x: (i) => Math.cos(i) * 400, 
                    y: (i) => Math.sin(i) * 400, 
                    scale: 0,
                    opacity: 0,
                    duration: 0.6, 
                    ease: "power4.out",
                    stagger: 0.01 // Slight delay between each bolt
                }, 0
            );
        }


        window.addEventListener("click", clash);
        

        clash();
    </script>
</body>
</html>

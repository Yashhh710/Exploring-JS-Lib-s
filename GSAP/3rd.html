<!DOCTYPE html>
<html>
<head>
    <title>GSAP 3D Holo-Tilt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #111, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* Crucial for 3D depth */
            overflow: hidden;
        }

        .card {
            width: 300px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
        }

        .card h2 {
            transform: translateZ(50px); /* Makes text "pop" out */
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.8);
            letter-spacing: 2px;
        }

        .glare {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2), transparent);
            pointer-events: none;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="glare"></div>
        <h2>SYSTEM</h2>
        <p style="transform: translateZ(30px); opacity: 0.6;">ACTIVE</p>
    </div>

    <script>
        const card = document.querySelector('.card');
        const glare = document.querySelector('.glare');

        window.addEventListener('mousemove', (e) => {

            const x = (e.clientX - window.innerWidth / 2) / (window.innerWidth / 2);
            const y = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2);


            gsap.to(card, {
                duration: 0.5,
                rotationY: x * 20, // Max 20 degrees tilt
                rotationX: -y * 20,
                ease: "power2.out"
            });


            gsap.to(glare, {
                duration: 0.5,
                x: x * 50,
                y: y * 50,
                opacity: Math.abs(x) + Math.abs(y)
            });
        });


        window.addEventListener('mouseleave', () => {
            gsap.to(card, { duration: 1, rotationX: 0, rotationY: 0, ease: "elastic.out(1, 0.3)" });
        });
    </script>
</body>
</html>

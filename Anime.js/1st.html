<!DOCTYPE html>
<html>
<head>
    <title>Anime.js Spiral Blade</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            width: 300px;
            height: 300px;
        }
        .dot {
            width: 20px;
            height: 20px;
            background-color: #ff0055;
            border-radius: 2px; /* Square blades */
            margin: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        </div>

    <script>
        const container = document.querySelector('.container');
        

        for (let i = 0; i < 100; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            container.appendChild(dot);
        }


        anime({
            targets: '.dot',
            scale: [
                {value: .1, easing: 'easeOutSine', duration: 500},
                {value: 1, easing: 'easeInOutQuad', duration: 1200}
            ],
            rotate: () => anime.random(-360, 360),
            borderRadius: ['0%', '50%'],
            backgroundColor: [
                {value: '#ff0055'}, // Neon Pink
                {value: '#00f2ff'}, // Neon Blue
                {value: '#7b33ff'}  // Haki Purple
            ],
            translateX: anime.stagger(10, {grid: [10, 10], from: 'center', axis: 'x'}),
            translateY: anime.stagger(10, {grid: [10, 10], from: 'center', axis: 'y'}),
            delay: anime.stagger(100, {grid: [10, 10], from: 'center'}),
            loop: true,
            direction: 'alternate',
            easing: 'easeInOutElastic(1, .5)'
        });
    </script>
</body>
</html>

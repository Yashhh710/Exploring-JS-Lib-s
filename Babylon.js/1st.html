<!DOCTYPE html>
<html>
<head>
    <title>Babylon.js: Grand Line Navigator</title>
    <script src="https://preview.babylonjs.com/babylon.js"></script>
    <script src="https://preview.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; background: #001122; }
        #renderCanvas { width: 100%; height: 100%; outline: none; }
        #overlay { 
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00f2ff; font-family: 'Courier New', monospace; pointer-events: none;
            text-shadow: 0 0 10px #00f2ff;
        }
    </style>
</head>
<body>
    <div id="overlay">LOG POSE: STRAW HAT SECTOR // CLICK TO NAVIGATE</div>
    <canvas id="renderCanvas"></canvas>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById("renderCanvas");
            const engine = new BABYLON.Engine(canvas, true);

            const createScene = function () {
                const scene = new BABYLON.Scene(engine);
                scene.clearColor = new BABYLON.Color3(0, 0.05, 0.1);


                const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 4, 15, BABYLON.Vector3.Zero(), scene);
                camera.attachControl(canvas, true);


                const gridGround = BABYLON.MeshBuilder.CreatePlane("grid", {size: 50}, scene);
                gridGround.rotation.x = Math.PI / 2;
                
                const gridMat = new BABYLON.GridMaterial("gridMat", scene);
                gridMat.mainColor = new BABYLON.Color3(0, 0.2, 0.3);
                gridMat.lineColor = new BABYLON.Color3(0, 0.8, 1);
                gridMat.gridRatio = 1;
                gridMat.opacity = 0.5;
                gridGround.material = gridMat;


                const player = BABYLON.MeshBuilder.CreateCylinder("player", {diameterTop: 0, diameterBottom: 1, height: 1.5, tessellation: 3}, scene);
                player.rotation.x = Math.PI / 2;
                const playerMat = new BABYLON.StandardMaterial("playerMat", scene);
                playerMat.emissiveColor = new BABYLON.Color3(1, 0.8, 0); // Gold aura
                player.material = playerMat;


                const glow = new BABYLON.GlowLayer("glow", scene);
                glow.intensity = 0.8;


                scene.onPointerDown = function (evt, pickResult) {
                    if (pickResult.hit) {
                        const targetPoint = pickResult.pickedPoint;
                        

                        BABYLON.Animation.CreateAndStartAnimation("move", player, "position", 60, 30, 
                            player.position, new BABYLON.Vector3(targetPoint.x, 0.75, targetPoint.z), 
                            BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
                        

                        player.lookAt(targetPoint);
                    }
                };


                let time = 0;
                scene.registerBeforeRender(() => {
                    time += 0.01;
                    gridGround.position.y = Math.sin(time) * 0.1; // Gentle sea bobbing
                });

                return scene;
            };

            const scene = createScene();
            engine.runRenderLoop(() => scene.render());
            window.addEventListener("resize", () => engine.resize());
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Tone.js Pro: Haki Sound Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; background: #000205; color: #ff0044; font-family: 'Courier New', monospace; 
               display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #haki-trigger {
            width: 200px; height: 200px; border-radius: 50%; border: 4px solid #ff0044;
            background: transparent; color: #ff0044; font-size: 20px; font-weight: bold;
            cursor: pointer; transition: 0.2s; box-shadow: 0 0 20px rgba(255, 0, 68, 0.2);
        }
        #haki-trigger:active { transform: scale(0.9); background: #ff0044; color: white; }
        .label { margin-top: 20px; letter-spacing: 5px; opacity: 0.6; }
    </style>
</head>
<body>

    <button id="haki-trigger">UNLEASH HAKI</button>
    <div class="label">AUDIO ENGINE: TONE.JS V14</div>

<script>


const distortion = new Tone.Distortion(0.8).toDestination();
const synth = new Tone.MonoSynth({
    oscillator: { type: "sine" },
    envelope: {
        attack: 0.001, // Instant impact
        decay: 0.4,
        sustain: 0,
        release: 1
    },
    filterEnvelope: {
        attack: 0.001,
        decay: 0.2,
        baseFrequency: 50,
        octaves: 4,
        exponent: 2
    }
}).connect(distortion);


const btn = document.getElementById("haki-trigger");

btn.addEventListener("click", async () => {

    await Tone.start();
    

    const now = Tone.now();
    

    synth.triggerAttackRelease("G1", "1n");
    

    document.body.style.backgroundColor = "#110005";
    setTimeout(() => {
        document.body.style.backgroundColor = "#000205";
    }, 100);
});

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ECharts Pro: Haki Gauge</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; background: #000205; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #main { width: 600px; height: 600px; filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.3)); }
    </style>
</head>
<body>

    <div id="main"></div>

<script>
const chartDom = document.getElementById('main');
const myChart = echarts.init(chartDom, 'dark'); // Initialize in dark mode


const option = {
    backgroundColor: 'transparent',
    series: [{
        type: 'gauge',
        startAngle: 210,
        endAngle: -30,
        min: 0,
        max: 100,
        splitNumber: 10,

        axisLine: {
            lineStyle: {
                width: 10,
                color: [
                    [0.3, '#00f2ff'], // Normal (Cyan)
                    [0.7, '#7000ff'], // Intense (Purple)
                    [1, '#ff0044']    // Danger/Supreme (Red)
                ]
            }
        },
        pointer: {
            itemStyle: { color: 'inherit' }
        },
        axisTick: { distance: -10, length: 8, lineStyle: { color: '#fff', width: 2 } },
        splitLine: { distance: -10, length: 20, lineStyle: { color: '#fff', width: 4 } },
        axisLabel: { color: 'inherit', distance: 30, fontSize: 14 },
        detail: {
            valueAnimation: true,
            formatter: '{value}%',
            color: 'inherit',
            fontSize: 40,
            offsetCenter: [0, '70%']
        },
        data: [{ value: 50, name: 'HAKI PRESSURE' }]
    }]
};

myChart.setOption(option);


setInterval(() => {

    const randomValue = +(Math.random() * 25 + 70).toFixed(2);
    
    myChart.setOption({
        series: [{
            data: [{ value: randomValue, name: 'HAKI PRESSURE' }]
        }]
    });
}, 1500); // 1.5 seconds for a "Heavy" cinematic update


window.addEventListener('resize', () => myChart.resize());
</script>
</body>
</html>

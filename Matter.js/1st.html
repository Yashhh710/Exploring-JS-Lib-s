<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phaser + Matter.js: Haki Chain</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000205; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #ui-text { position: absolute; top: 20px; color: #ff0044; font-family: 'Courier New', monospace; letter-spacing: 2px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui-text">WEAPON: HAKI CHAIN // SWING MOUSE TO SMASH</div>
    <script>
        class MatterProScene extends Phaser.Scene {
            constructor() { super('MatterProScene'); }

            preload() {
                const graphics = this.make.graphics({ x: 0, y: 0, add: false });
                

                graphics.lineStyle(2, 0xff0044, 1);
                graphics.strokeRoundedRect(0, 0, 20, 10, 4);
                graphics.generateTexture('link', 20, 10);


                graphics.clear();
                graphics.fillStyle(0x00f2ff, 0.5);
                graphics.lineStyle(1, 0x00f2ff, 1);
                graphics.fillRect(0, 0, 30, 30);
                graphics.strokeRect(0, 0, 30, 30);
                graphics.generateTexture('brick', 30, 30);
            }

            create() {
                this.matter.world.setBounds();


                for (let i = 0; i < 8; i++) {
                    for (let j = 0; j < 10; j++) {
                        this.matter.add.image(600 + (i * 30), 150 + (j * 30), 'brick', null, { 
                            restitution: 0.5, 
                            friction: 0.1,
                            density: 0.001 
                        });
                    }
                }



                let prev = this.matter.add.circle(400, 300, 1, { isStatic: true, isSensor: true });
                this.anchor = prev;

                const group = this.matter.world.nextGroup(true);

                for (let i = 0; i < 12; i++) {
                    const link = this.matter.add.image(400, 300 + (i * 20), 'link', null, { 
                        collisionFilter: { group: group },
                        chamfer: 5,
                        density: 0.005
                    });

                    this.matter.add.constraint(prev, link, i === 0 ? 0 : 15, 0.8);
                    prev = link;
                }


                this.wreckingBall = prev;
                this.wreckingBall.setScale(2);
                this.wreckingBall.setMass(10); // Heavy impact


                this.input.on('pointermove', (pointer) => {
                    this.anchor.position.x = pointer.x;
                    this.anchor.position.y = pointer.y;
                });
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 1000,
            height: 600,
            backgroundColor: '#000810',
            physics: {
                default: 'matter',
                matter: { gravity: { y: 1 }, debug: false }
            },
            scene: MatterProScene
        };

        new Phaser.Game(config);
    </script>
</body>
</html>

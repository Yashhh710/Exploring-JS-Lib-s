<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D3.js Pro: One Piece Influence Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background: #000810; overflow: hidden; height: 100vh; font-family: 'Inter', sans-serif; }
        .link { stroke: #ff0044; stroke-opacity: 0.4; stroke-width: 2px; stroke-dasharray: 5,5; }
        #ui-overlay {
            position: absolute; top: 20px; left: 20px; color: #ff0044; 
            text-transform: uppercase; letter-spacing: 3px; border-left: 3px solid #ff0044; padding-left: 15px;
        }
        .node-label { fill: #fff; font-size: 12px; font-weight: bold; pointer-events: none; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        DOMAIN: NEW_WORLD_HIERARCHY<br>
        SYSTEM: CONQUERORS_HAKI_REBELS<br>
        <span style="color: #00f2ff; font-size: 10px;">Drag the Captains to reshape the era</span>
    </div>
    <svg id="chart"></svg>

<script>
const width = window.innerWidth;
const height = window.innerHeight;


const nodes = [
    { id: "Luffy", size: 45, img: "https://i.pinimg.com/originals/12/f2/df/12f2df34279090b79f04ca430d8d070b.png" },
    { id: "Zoro", size: 35, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_45A_wOaZ9_p6P9PzG-0u_wVlC3Z_GZzP7w&s" },
    { id: "Sanji", size: 35, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTeu8GkQ0W_p267L7b7U5nK7v9vW8v6u6U6eA&s" },
    { id: "Shanks", size: 50, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ7y2l6Z_Z1f_j1_e4u6e6e6u6e6e6e6e6e6A&s" },
    { id: "Buggy", size: 40, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6u6e6e6u6e6e6u6e6e6e6e6e6e6e6e6e6A&s" }
];

const links = [
    { source: "Luffy", target: "Zoro" },
    { source: "Luffy", target: "Sanji" },
    { source: "Shanks", target: "Luffy" },
    { source: "Buggy", target: "Shanks" }
];

const svg = d3.select("#chart").attr("width", width).attr("height", height);



const defs = svg.append("defs");
nodes.forEach(d => {
    defs.append("pattern")
        .attr("id", `pattern-${d.id}`)
        .attr("width", 1)
        .attr("height", 1)
        .append("image")
        .attr("xlink:href", d.img)
        .attr("width", d.size * 2)
        .attr("height", d.size * 2)
        .attr("x", 0)
        .attr("y", 0);
});


const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(200))
    .force("charge", d3.forceManyBody().strength(-1500))
    .force("center", d3.forceCenter(width / 2, height / 2));


const link = svg.append("g")
    .selectAll("line")
    .data(links)
    .join("line")
    .attr("class", "link");

const node = svg.append("g")
    .selectAll("g")
    .data(nodes)
    .join("g")
    .call(d3.drag()
        .on("start", dragStarted)
        .on("drag", dragged)
        .on("end", dragEnded));


node.append("circle")
    .attr("r", d => d.size)
    .attr("fill", d => `url(#pattern-${d.id})`)
    .attr("stroke", "#ff0044")
    .attr("stroke-width", 3);


node.append("text")
    .attr("class", "node-label")
    .attr("dy", d => d.size + 15)
    .attr("text-anchor", "middle")
    .text(d => d.id);


simulation.on("tick", () => {
    link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);

    node.attr("transform", d => `translate(${d.x},${d.y})`);
});


function dragStarted(event) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    event.subject.fx = event.subject.x;
    event.subject.fy = event.subject.y;
}
function dragged(event) {
    event.subject.fx = event.x;
    event.subject.fy = event.y;
}
function dragEnded(event) {
    if (!event.active) simulation.alphaTarget(0);
    event.subject.fx = null;
    event.subject.fy = null;
}
</script>
</body>
</html>

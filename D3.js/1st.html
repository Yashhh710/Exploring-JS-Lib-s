<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D3.js Pro: Haki Force Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background: #00050a; overflow: hidden; height: 100vh; }
        .node { stroke: #00f2ff; stroke-width: 2px; filter: drop-shadow(0 0 5px #00f2ff); }
        .link { stroke: #ff0044; stroke-opacity: 0.3; stroke-width: 1px; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00f2ff; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        CORE: D3_FORCE_SIMULATION_V7<br>
        ENGINE: VERLET_INTEGRATION<br>
        DRAG NODES TO DISTORT WILL
    </div>
    <svg id="canvas"></svg>

<script>

const data = {
    nodes: [
        { id: "King", size: 30, color: "#fff" },
        { id: "A", size: 15 }, { id: "B", size: 15 }, { id: "C", size: 15 },
        { id: "D", size: 10 }, { id: "E", size: 10 }, { id: "F", size: 10 }
    ],
    links: [
        { source: "King", target: "A" }, { source: "King", target: "B" },
        { source: "King", target: "C" }, { source: "A", target: "D" },
        { source: "B", target: "E" }, { source: "C", target: "F" }
    ]
};

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#canvas")
    .attr("width", width)
    .attr("height", height);


const simulation = d3.forceSimulation(data.nodes)

    .force("charge", d3.forceManyBody().strength(-800))

    .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))

    .force("center", d3.forceCenter(width / 2, height / 2));


const link = svg.append("g")
    .selectAll("line")
    .data(data.links)
    .join("line")
    .attr("class", "link");

const node = svg.append("g")
    .selectAll("circle")
    .data(data.nodes)
    .join("circle")
    .attr("class", "node")
    .attr("r", d => d.size)
    .attr("fill", d => d.color || "#000")
    .call(d3.drag() // Pro-Interaction: Dragging
        .on("start", dragStarted)
        .on("drag", dragged)
        .on("end", dragEnded));


simulation.on("tick", () => {
    link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);

    node
        .attr("cx", d => d.x)
        .attr("cy", d => d.y);
});


function dragStarted(event) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    event.subject.fx = event.subject.x;
    event.subject.fy = event.subject.y;
}
function dragged(event) {
    event.subject.fx = event.x;
    event.subject.fy = event.y;
}
function dragEnded(event) {
    if (!event.active) simulation.alphaTarget(0);
    event.subject.fx = null;
    event.subject.fy = null;
}
</script>
</body>
</html>

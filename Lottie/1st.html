<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottie Pro: Evolutionary Diff</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-interactivity@latest/dist/lottie-interactivity.min.js"></script>
    
    <style>
        body { margin: 0; background: #000; font-family: 'Syncopate', sans-serif; color: #fff; overflow-x: hidden; }
        
        /* The Background Animation */
        #lottie-background {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1; opacity: 0.6;
            filter: hue-rotate(280deg); /* Shift to a "Haki Purple/Red" */
        }

        /* Content Sections to enable scrolling */
        section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3vw;
            letter-spacing: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hud-overlay {
            position: fixed; top: 20px; right: 20px;
            color: #ff0044; font-family: monospace; font-size: 12px;
            text-align: right; pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="hud-overlay">
        SYNC_MODE: SCROLL_MAPPING<br>
        ASSET_ID: NEURAL_CORE_V9<br>
        TRANSITION: SMOOTH_INTERPOLATION
    </div>

    <lottie-player
        id="lottie-target"
        src="https://lottie.host/805307b0-8451-4034-8c83-3605c45330a1/mFv5IBy5W3.json"
        background="transparent"
        style="width: 100%; height: 100%;"
        id="lottie-background">
    </lottie-player>

    <section>01. Initializing Will</section>
    <section>02. Analyzing Haki</section>
    <section>03. Supreme Awakening</section>
    <section>04. Final Dominance</section>

    <script>

        LottieInteractivity.create({
            player: '#lottie-target',
            mode: 'scroll',
            actions: [
                {
                    visibility: [0, 1.0], // When the player is 0% to 100% visible
                    type: 'seek',
                    frames: [0, 180], // Play the animation from start to finish as you scroll
                }
            ]
        });
    </script>
</body>
</html>
